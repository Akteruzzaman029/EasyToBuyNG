<!-- Featured Products -->

<div class="container-fluid py-3">
    <div class="row g-3">

        <!-- LEFT SIDEBAR -->
        <aside class="col-12 col-lg-3 col-xl-2">
            <div class="p-3 border rounded-3 bg-white">
                <h6 class="fw-semibold mb-3">Filter by Price</h6>
                <!-- Simple "fake" slider (Bootstrap has no native range slider UI like the screenshot).
             You can use <input type="range"> or a library (noUiSlider) for the real one. -->
                <nz-slider nzRange [(ngModel)]="priceRange" [nzMin]="1" [nzMax]="50000"
                    (ngModelChange)="onPriceRangeChange($event)" />
                <div class="d-flex justify-content-between small text-muted mb-4">
                    <span>৳ {{priceRange[0]}}</span>
                    <span>৳ {{priceRange[1]}}</span>
                </div>
                <h6 class="fw-semibold mb-3">Product Categories</h6>
                <!-- Category list -->
                <app-common-category-tree (nodeClicked)="onCategoryNodeClicked($event)"></app-common-category-tree>

            </div>


            <div class="brand-filter-card px-2 mt-3">
                <h6 class="fw-semibold mb-3">Filter by Brand</h6>

                <div class="search-box">
                    <input type="text" [(ngModel)]="brandSearchText" (ngModelChange)="onBrandSearch()"
                        placeholder="Search here..." class="search-input" />
                </div>

                <div class="brand-list">
                    <label class="brand-item" *ngFor="let item of filteredBrandList">
                        <div class="brand-left">
                            <input type="checkbox" [checked]="item.isChecked" (change)="onBrandChecked(item)" />
                            <span class="brand-name">{{ item.name }}</span>
                        </div>

                        <span class="brand-count">{{ item.productCount }}</span>
                    </label>
                </div>
            </div>


        </aside>


        <!-- RIGHT CONTENT -->
        <main class="col-12 col-lg-9 col-xl-10">
            <!-- Top bar -->
            <div class="d-flex flex-column flex-md-row gap-2 align-items-md-center justify-content-between mb-3">
                <div class="flex-grow-1">
                    <div class="input-group">
                        <span class="input-group-text bg-white">🔍</span>
                        <input class="form-control" [(ngModel)]="oProductFilterDto.name" placeholder="Search here..."
                            appDebounceInput (debounceValue)="onSearchDebounce($event)" />
                    </div>
                </div>

                <div style="min-width:220px">
                    <select class="form-select" (change)="Filter()" [(ngModel)]="oProductFilterDto.sortBy" name=""
                        sortBy>
                        <option value="">Default sorting</option>
                        <option value="price_asc">Price: low to high</option>
                        <option value="price_desc">Price: high to low</option>
                        <option value="pid_desc">Newest</option>
                        <option value="pid_asc">Oldest</option>
                        <option value="popularity_desc">Most popular</option>
                        <option value="popularity_asc">Least popular</option>
                        <option value="product_name_asc">Product name: A to Z</option>
                        <option value="product_name_desc">Product name: Z to A</option>
                    </select>
                </div>
            </div>

            <!-- Active filter chip row -->
            <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
                <span class="badge rounded-pill text-bg-danger px-3 py-2">
                    Makeup &gt; Face &gt; Makeup Remover
                    <button class="btn btn-sm btn-link text-white text-decoration-none ms-1 p-0">✕</button>
                </span>
                <button class="btn btn-link text-decoration-none p-0">Clear all</button>
            </div>

            <!-- Product grid -->
            <div class="row g-3">
                <div class="products-grid">
                    <div class="product-card" *ngFor="let product of productList">
                        <div  (click)="details(product)"  class="product-image-wrap">
                            <img [src]="GetImageUrl(product.fileId)" class="product-image" [alt]="product.name" />
                            <div class="product-overlay">
                                <button class="overlay-btn" (click)="AddToCart(product)">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <circle cx="9" cy="21" r="1" />
                                        <circle cx="20" cy="21" r="1" />
                                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                                    </svg>
                                    Quick Add
                                </button>
                            </div>
                            <span class="product-badge">New</span>
                        </div>
                        <div class="product-info">
                            <h3 class="product-name">{{ product.name }}</h3>
                            <p class="product-desc">{{ product.description | truncate: 80 }}</p>
                            <div class="product-footer">
                                <span class="product-price">{{ product.purchasePrice | currency: 'Tk.' }}</span>
                                <button class="add-cart-btn" (click)="AddToCart(product)">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2.5">
                                        <line x1="12" y1="5" x2="12" y2="19" />
                                        <line x1="5" y1="12" x2="19" y2="12" />
                                    </svg>
                                    Add to Cart
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Empty State -->
                <div class="empty-state" *ngIf="productList.length === 0">
                    <div class="empty-icon">📦</div>
                    <h3>No products found</h3>
                    <p>Check back soon for new arrivals</p>
                </div>

            </div>
        </main>
    </div>
</div>
