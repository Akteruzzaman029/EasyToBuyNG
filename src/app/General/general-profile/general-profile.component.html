<div class="container my-5">
  <!-- Customer Profile Header -->
  <div class="row mb-4">
    <div class="col-12 text-center">
      <h1 class="display-4">Customer Profile</h1>
      <p class="lead">View and edit your personal details and order history</p>
    </div>
  </div>

  <!-- Customer Information Section -->
  <div class="row mb-4">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header">
          <h5>Personal Information</h5>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-12 mb-3">
              <label for="customerName" class="form-label">Full Name</label>
              <input type="text" id="customerName" class="form-control" value="John Doe" readonly>
            </div>
            <div class="col-12 mb-3">
              <label for="customerEmail" class="form-label">Email Address</label>
              <input type="email" id="customerEmail" class="form-control" value="johndoe@example.com" readonly>
            </div>
            <div class="col-12 mb-3">
              <label for="customerPhone" class="form-label">Phone Number</label>
              <input type="text" id="customerPhone" class="form-control" value="+1 234 567 890" readonly>
            </div>
            <div class="col-12 mb-3">
              <label for="customerAddress" class="form-label">Shipping Address</label>
              <textarea id="customerAddress" class="form-control" rows="3" readonly>1234 Elm St, Springfield, IL 62701</textarea>
            </div>
          </div>
        </div>
        <div class="card-footer text-center">
          <button class="btn btn-primary">Edit Profile</button>
        </div>
      </div>
    </div>

    <!-- Order History Section -->
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header">
          <h5>Order History</h5>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-bordered">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Order Date</th>
                  <th>Status</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>1</td>
                  <td>2025-08-15</td>
                  <td><span class="badge bg-success">Delivered</span></td>
                  <td>$150.00</td>
                </tr>
                <tr>
                  <td>2</td>
                  <td>2025-07-20</td>
                  <td><span class="badge bg-warning">In Progress</span></td>
                  <td>$75.50</td>
                </tr>
                <tr>
                  <td>3</td>
                  <td>2025-06-30</td>
                  <td><span class="badge bg-danger">Cancelled</span></td>
                  <td>$120.00</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
