<div class="container mx-auto p-4">
  <h2 class="text-xl font-bold mb-4">Select Delivery Location</h2>
  
  <div class="w-full mt-4">
    <div class="map-wrapper border-2 border-gray-200 shadow-inner rounded-xl overflow-hidden" style="height: 500px;">
      <google-map
        width="100%"
        height="100%"
        [center]="center"
        [zoom]="zoom"
        [options]="mapOptions"
        (mapClick)="onMapClick($event)">
        
        <map-marker
          [position]="markerPosition"
          [options]="markerOptions"
          (mapDragend)="onMarkerDragEnd($event)">
        </map-marker>
      </google-map>

      <div class="absolute bottom-4 left-4 bg-white p-2 rounded shadow-md z-10">
        <div class="text-[10px] font-mono text-gray-600">
          <span class="font-bold text-green-600">Lat:</span> {{ oComplain.complainAddressLat || '0' }}
        </div>
        <div class="text-[10px] font-mono text-gray-600">
          <span class="font-bold text-green-600">Long:</span> {{ oComplain.complainAddressLong || '0' }}
        </div>
      </div>
    </div>

    <p class="text-sm text-gray-500 mt-2">মানচিত্রের ওপর ক্লিক করে বা মার্কারটি টেনে সঠিক স্থান নির্বাচন করুন</p>

    <div *ngIf="isLocationLoading" class="mt-2 text-amber-600 animate-pulse">লোকেশন নেওয়া হচ্ছে...</div>

    <div *ngIf="showLocationModal && !isLocationGranted" class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/40 px-4">
        </div>
    
    <button (click)="confirmLocation()" class="mt-4 w-full bg-green-600 text-white py-3 rounded-xl font-bold">
        Confirm Location
    </button>
  </div>
</div>
