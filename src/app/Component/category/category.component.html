<div class="row g-0">

    <div class="col-2 px-1">
        <div class="mb-2">
            <input type="text" class="form-control" [(ngModel)]="oCategoryFilterRequestDto.name" name="name"
                placeholder="type here ...">
        </div>
    </div>
    <div class="col-2 px-1">
        <div class="mb-2">
            <nz-tree-select class="w-100" [nzNodes]="nodes" [(ngModel)]="oCategoryFilterRequestDto.parentId"
                nzShowSearch nzPlaceHolder="Please select category" nzVirtualHeight="300px" [nzHideUnMatched]="true">
            </nz-tree-select>
        </div>
    </div>
    <div class="col-2 px-1">
        <div class="mb-2">
            <select class="form-select" [(ngModel)]="oCategoryFilterRequestDto.isActive" name="isActive"
                aria-label="Default select example">
                <option value="true">Active</option>
                <option value="false">Inactive</option>
            </select>
        </div>
    </div>

    <div class="col-2 px-1">
        <div class="mb-2">
            <button class="btn btn-success" (click)="Filter()">Search</button>
        </div>
    </div>
    <div class="col text-end">
        <button class="btn btn-success mx-1" (click)="add()"> <i class="bi bi-plus"></i> Add</button>
        <button class="btn btn-success mx-1" (click)="edit()"><i class="bi bi-pencil-square"></i> Edit</button>
        <button class="btn btn-danger mx-1" (click)="delete()"><i class="bi bi-trash3"></i> Delete</button>
    </div>


    <div class="col-md-12">
        <ag-grid-angular class="ag-theme-alpine" style="height: 70vh;width: 100%;" [columnDefs]="colDefsTransection"
            [rowData]="rowData" [rowSelection]="'single'" (gridReady)="onGridReadyTransection($event)"
            [defaultColDef]="DeafultCol">
        </ag-grid-angular>
    </div>


    <div class="col-md-12">
        <app-pagination [pageSize]="10" [currentPage]="pageIndex" [totalItems]="totalRecords"
            (pageChange)="PageChange($event)"></app-pagination>
    </div>


</div>


<!-- Button trigger modal -->
<button type="button" class="btn btn-primary" hidden id="openCommonModel" data-bs-toggle="modal"
    data-bs-target="#exampleModal">
    Launch demo modal
</button>


<!-- Modal -->
<div class="modal fade" id="exampleModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
    aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">Category
                    @if (categoryId==0){Create} @if (categoryId>0){Update}
                </h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" id="closeCommonModel"
                    aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row g-0">

                    <div class="col-12 px-1">
                        <div class="mb-2">
                            <label for="parentId" class="form-label">Category</label>
                            <nz-tree-select class="w-100" [nzNodes]="nodes" [(ngModel)]="oCategoryRequestDto.parentId"
                                nzShowSearch nzPlaceHolder="Please select category" nzVirtualHeight="300px"
                                [nzDropdownStyle]="{ 'max-height': '300px', 'overflow': 'auto', 'z-index': 2050 }"
                                [nzHideUnMatched]="true">
                            </nz-tree-select>
                        </div>
                    </div>

                    <div class="col-12 px-1">
                        <div class="mb-2">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" [(ngModel)]="oCategoryRequestDto.name" name="name"
                                placeholder="Please enter name">
                        </div>
                    </div>

                    <div class="col-12 px-1">
                        <div class="mb-2">
                            <label for="uploadFile" class="form-label">Image</label>
                            <input type="file" class="form-control" id="uploadFile" (change)="onFileChange($event)"
                                placeholder="Select file to upload">
                        </div>
                    </div>

                    <div class="col-12 px-1 my-2">
                        <div *ngIf="oCategoryRequestDto.fileId>0" class="overflow-hidden">
                            <img [src]="GetImageUrl(oCategoryRequestDto.fileId)" [alt]=""
                                class="w-full h-[220px] object-cover" />
                        </div>
                    </div>


                    <div class="col-12 px-1">
                        <div class="mb-2">
                            <label for="sequenceNo" class="form-label">Sequence No</label>
                            <input type="text" class="form-control" [(ngModel)]="oCategoryRequestDto.sequenceNo"
                                name="sequenceNo" placeholder="Please enter sequence no">
                        </div>
                    </div>

                    <div class="col-12 px-1">
                        <div class="mb-2">
                            <label for="isActive" class="form-label">Status</label>
                            <select class="form-select" [(ngModel)]="oCategoryRequestDto.isActive" name="isActive"
                                aria-label="Default select example">
                                <option value="true">Active</option>
                                <option value="false">Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-12 mb-3">
                        <label for="remarks" class="form-label">Remarks</label>
                        <textarea class="form-control" name="remarks" [(ngModel)]="oCategoryRequestDto.remarks"
                            id="remarks" rows="3"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                @if (categoryId==0){
                <button type="button" class="btn btn-primary" (click)="InsertCategory()">Save</button>
                }
                @if (categoryId>0){
                <button type="button" class="btn btn-primary" (click)="UpdateCategory()">Update</button>
                }
            </div>
        </div>
    </div>
</div>


<nz-modal
  [(nzVisible)]="isVisibleModal"
  [nzTitle]="modalTitle"
  [nzWidth]="700"
  [nzClosable]="true"
  [nzMaskClosable]="false"
  [nzKeyboard]="false"
  [nzFooter]="modalFooter"
  (nzOnCancel)="handleCancel()"
>
  <ng-container *nzModalContent>
    <div class="grid grid-cols-12 gap-3">
      <div class="col-span-12">
        <label for="parentId" class="mb-1 block text-sm font-medium text-gray-700">
          Category
        </label>

        <nz-tree-select
          class="w-full"
          [nzNodes]="nodes"
          [(ngModel)]="oCategoryRequestDto.parentId"
          nzShowSearch
          nzPlaceHolder="Please select category"
          nzVirtualHeight="300px"
          [nzHideUnMatched]="true"
          [nzDropdownStyle]="{
            'max-height': '300px',
            'overflow': 'auto',
            'z-index': 2050
          }">
        </nz-tree-select>
      </div>

      <div class="col-span-12">
        <label for="name" class="mb-1 block text-sm font-medium text-gray-700">
          Name
        </label>
        <input
          id="name"
          type="text"
          class="w-full rounded-md border border-gray-300 px-3 py-2 outline-none focus:border-blue-500"
          [(ngModel)]="oCategoryRequestDto.name"
          name="name"
          placeholder="Please enter name" />
      </div>

      <div class="col-span-12">
        <label for="uploadFile" class="mb-1 block text-sm font-medium text-gray-700">
          Image
        </label>
        <input
          id="uploadFile"
          type="file"
          class="block w-full rounded-md border border-gray-300 px-3 py-2"
          (change)="onFileChange($event)" />
      </div>

      <div class="col-span-12" *ngIf="oCategoryRequestDto.fileId > 0">
        <div class="overflow-hidden rounded-md border border-gray-200">
          <img
            [src]="GetImageUrl(oCategoryRequestDto.fileId)"
            alt="category-image"
            class="h-[220px] w-full object-cover" />
        </div>
      </div>

      <div class="col-span-12">
        <label for="sequenceNo" class="mb-1 block text-sm font-medium text-gray-700">
          Sequence No
        </label>
        <input
          id="sequenceNo"
          type="number"
          class="w-full rounded-md border border-gray-300 px-3 py-2 outline-none focus:border-blue-500"
          [(ngModel)]="oCategoryRequestDto.sequenceNo"
          name="sequenceNo"
          placeholder="Please enter sequence no" />
      </div>

      <div class="col-span-12">
        <label for="isActive" class="mb-1 block text-sm font-medium text-gray-700">
          Status
        </label>
        <select
          id="isActive"
          class="w-full rounded-md border border-gray-300 px-3 py-2 outline-none focus:border-blue-500"
          [(ngModel)]="oCategoryRequestDto.isActive"
          name="isActive">
          <option [ngValue]="true">Active</option>
          <option [ngValue]="false">Inactive</option>
        </select>
      </div>

      <div class="col-span-12">
        <label for="remarks" class="mb-1 block text-sm font-medium text-gray-700">
          Remarks
        </label>
        <textarea
          id="remarks"
          rows="3"
          class="w-full rounded-md border border-gray-300 px-3 py-2 outline-none focus:border-blue-500"
          name="remarks"
          [(ngModel)]="oCategoryRequestDto.remarks">
        </textarea>
      </div>
    </div>
  </ng-container>

  <ng-template #modalFooter>
    <div class="flex justify-end gap-2">
      <button nz-button (click)="handleCancel()">Cancel</button>

      <button
        *ngIf="categoryId === 0"
        nz-button
        nzType="primary"
        (click)="InsertCategory()">
        Save
      </button>

      <button
        *ngIf="categoryId > 0"
        nz-button
        nzType="primary"
        (click)="UpdateCategory()">
        Update
      </button>
    </div>
  </ng-template>
</nz-modal>
