<div class="row g-0">

    <div class="col-2 px-1">
        <div class="mb-2">
            <input type="text" class="form-control" [(ngModel)]="oCustomCategoryFilterDto.name" name="name"
                placeholder="type here ...">
        </div>
    </div>
    <div class="col-2 px-1">
        <div class="mb-2">
            <select class="form-select" [(ngModel)]="oCustomCategoryFilterDto.typeTag" name="typeTag"
                aria-label="Default select example">
                <option value="">-- Select category tag--</option>
                <option value="product_category">Product Category</option>
                <option value="product_sub_category">Product Sub Category</option>
                <option value="brand">Brand</option>
                <option value="combo_offer">Combo Offer</option>
                <option value="featured_category">Featured Category</option>
                <option value="home_category">Home Category</option>
                <option value="menu_category">Menu Category</option>
                <option value="offer_category">Offer Category</option>
                <option value="flash_sale_category">Flash Sale Category</option>
                <option value="top_category">Top Category</option>
                <option value="custom_category">Custom Category</option>
            </select>
        </div>
    </div>

    <div class="col-2 px-1">
        <div class="mb-2">
            <nz-tree-select class="w-100" [nzNodes]="nodes" [(ngModel)]="oCustomCategoryFilterDto.categoryId"
                nzShowSearch nzPlaceHolder="Please select category" nzVirtualHeight="300px" [nzHideUnMatched]="true">
            </nz-tree-select>
        </div>
    </div>

    <div class="col-2 px-1">
        <div class="mb-2">
            <select class="form-select" [(ngModel)]="oCustomCategoryFilterDto.isActive" name="isActive"
                aria-label="Default select example">
                <option value="true">Active</option>
                <option value="false">Inactive</option>
            </select>
        </div>
    </div>

    <div class="col-2 px-1">
        <div class="mb-2">
            <button class="btn btn-success" (click)="Filter()">Search</button>
        </div>
    </div>
    <div class="col text-end">
        <button class="btn btn-success mx-1" (click)="add()"> <i class="bi bi-plus"></i> Add</button>
        <button class="btn btn-success mx-1" (click)="edit()"><i class="bi bi-pencil-square"></i> Edit</button>
        <button class="btn btn-danger mx-1" (click)="delete()"><i class="bi bi-trash3"></i> Delete</button>
    </div>


    <div class="col-md-12">
        <ag-grid-angular class="ag-theme-alpine" style="height: 70vh;width: 100%;" [columnDefs]="colDefsTransection"
            [rowData]="rowData" [rowSelection]="'single'" (gridReady)="onGridReadyTransection($event)"
            [defaultColDef]="DeafultCol">
        </ag-grid-angular>
    </div>


    <div class="col-md-12">
        <app-pagination [pageSize]="10" [currentPage]="pageIndex" [totalItems]="totalRecords"
            (pageChange)="PageChange($event)"></app-pagination>
    </div>


</div>


<!-- Button trigger modal -->
<button type="button" class="btn btn-primary" hidden id="openCommonModel" data-bs-toggle="modal"
    data-bs-target="#exampleModal">
    Launch demo modal
</button>


<!-- Modal -->
<div class="modal fade" id="exampleModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
    aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">CustomCategory
                    @if (customcategoryId==0){Create} @if (customcategoryId>0){Update}
                </h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" id="closeCommonModel"
                    aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row g-0">

                    <div class="col-12 px-1">
                        <div class="mb-2">
                            <label for="typeTag" class="form-label"> Category Tag</label>
                            <select class="form-select" [(ngModel)]="oCustomCategoryRequestDto.typeTag" name="typeTag"
                                aria-label="Default select example">
                                <option value="">-- Select category tag--</option>
                                <option value="product_category">Product Category</option>
                                <option value="product_sub_category">Product Sub Category</option>
                                <option value="brand">Brand</option>
                                <option value="combo_offer">Combo Offer</option>
                                <option value="featured_category">Featured Category</option>
                                <option value="home_category">Home Category</option>
                                <option value="menu_category">Menu Category</option>
                                <option value="offer_category">Offer Category</option>
                                <option value="flash_sale_category">Flash Sale Category</option>
                                <option value="top_category">Top Category</option>
                                <option value="custom_category">Custom Category</option>
                            </select>
                        </div>
                    </div>

                    <div class="col-12 px-1">
                        <div class="mb-2">
                            <label for="categoryId" class="form-label"> Category</label>
                            <nz-tree-select class="w-100" [nzNodes]="nodes"
                                [(ngModel)]="oCustomCategoryRequestDto.categoryId" nzShowSearch
                                nzPlaceHolder="Please select category" nzVirtualHeight="300px" [nzHideUnMatched]="true">
                            </nz-tree-select>
                        </div>
                    </div>

                    <div class="col-12 px-1">
                        <div class="mb-2">
                            <label for="typeTag" class="form-label"> Category Tag</label>
                            <select class="form-select" [(ngModel)]="oCustomCategoryRequestDto.typeTag" name="typeTag"
                                aria-label="Default select example">
                                <option value="">-- Select category tag--</option>
                                <option value="product_category">Product Category</option>
                                <option value="product_sub_category">Product Sub Category</option>
                                <option value="brand">Brand</option>
                                <option value="combo_offer">Combo Offer</option>
                                <option value="featured_category">Featured Category</option>
                                <option value="home_category">Home Category</option>
                                <option value="menu_category">Menu Category</option>
                                <option value="offer_category">Offer Category</option>
                                <option value="flash_sale_category">Flash Sale Category</option>
                                <option value="top_category">Top Category</option>
                                <option value="custom_category">Custom Category</option>
                            </select>
                        </div>
                    </div>

                    <div class="col-12 px-1">
                        <div class="mb-2">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" [(ngModel)]="oCustomCategoryRequestDto.name"
                                name="name" placeholder="Please enter name">
                        </div>
                    </div>

                    <div class="col-12 px-1">
                        <div class="mb-2">
                            <label for="uploadFile" class="form-label">Image</label>
                            <input type="file" class="form-control" id="uploadFile" (change)="onFileChange($event)"
                                placeholder="Select file to upload">
                        </div>
                    </div>

                    <div class="col-12 px-1 my-2">
                        <div *ngIf="oCustomCategoryRequestDto.fileId>0" class="overflow-hidden">
                            <img [src]="GetImageUrl(oCustomCategoryRequestDto.fileId)" [alt]=""
                                class="w-full h-[220px] object-cover" />
                        </div>
                    </div>


                    <div class="col-12 px-1">
                        <div class="mb-2">
                            <label for="sequenceNo" class="form-label">Sequence No</label>
                            <input type="text" class="form-control" [(ngModel)]="oCustomCategoryRequestDto.sequenceNo"
                                name="sequenceNo" placeholder="Please enter sequence no">
                        </div>
                    </div>

                    <div class="col-12 px-1">
                        <div class="mb-2">
                            <label for="isActive" class="form-label">Status</label>
                            <select class="form-select" [(ngModel)]="oCustomCategoryRequestDto.isActive" name="isActive"
                                aria-label="Default select example">
                                <option value="true">Active</option>
                                <option value="false">Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-12 mb-3">
                        <label for="remarks" class="form-label">Remarks</label>
                        <textarea class="form-control" name="remarks" [(ngModel)]="oCustomCategoryRequestDto.remarks"
                            id="remarks" rows="3"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                @if (customcategoryId==0){
                <button type="button" class="btn btn-primary" (click)="InsertCustomCategory()">Save</button>
                }
                @if (customcategoryId>0){
                <button type="button" class="btn btn-primary" (click)="UpdateCustomCategory()">Update</button>
                }
            </div>
        </div>
    </div>
</div>



<button type="button" class="btn btn-primary" hidden data-bs-toggle="modal" id="openCommonDelete"
    data-bs-target="#staticCommonBackdrop">
    Launch static backdrop modal
</button>

<!-- Modal -->
<div class="modal fade" id="staticCommonBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
    aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="staticBackdropLabel">CustomCategory Delete</h1>
                <button type="button" class="btn-close" id="closeCommonDelete" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row g-0">
                    <div class="col-md-6 h2 text-center">
                        are you confirm delete?
                    </div>
                </div>
            </div>
            <div class="modal-footer text-center">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"> Close </button>
                <button type="button" class="btn btn-primary" (click)="DeleteCustomCategory()"> Confirm </button>
            </div>
        </div>
    </div>
</div>
