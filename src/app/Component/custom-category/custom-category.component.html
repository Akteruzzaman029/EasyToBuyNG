<div class="row g-0">

    <div class="col-2 px-1">
        <div class="mb-2">
            <input type="text" class="form-control" [(ngModel)]="oCustomCategoryFilterDto.name" name="name"
                placeholder="type here ...">
        </div>
    </div>
    <div class="col-2 px-1">
        <div class="mb-2">
            <select class="form-select" [(ngModel)]="oCustomCategoryFilterDto.typeTag" name="typeTag"
                aria-label="Default select example">
                <option value="">-- Select category tag--</option>
                <option value="product_category">Product Category</option>
                <option value="product_sub_category">Product Sub Category</option>
                <option value="brand">Brand</option>
                <option value="combo_offer">Combo Offer</option>
                <option value="featured_category">Featured Category</option>
                <option value="home_category">Home Category</option>
                <option value="menu_category">Menu Category</option>
                <option value="offer_category">Offer Category</option>
                <option value="flash_sale_category">Flash Sale Category</option>
                <option value="top_category">Top Category</option>
                <option value="custom_category">Custom Category</option>
            </select>
        </div>
    </div>

    <div class="col-2 px-1">
        <div class="mb-2">
            <nz-tree-select class="w-100" [nzNodes]="nodes" [(ngModel)]="oCustomCategoryFilterDto.categoryId"
                nzShowSearch nzPlaceHolder="Please select category" nzVirtualHeight="300px" [nzHideUnMatched]="true">
            </nz-tree-select>
        </div>
    </div>

    <div class="col-2 px-1">
        <div class="mb-2">
            <select class="form-select" [(ngModel)]="oCustomCategoryFilterDto.isActive" name="isActive"
                aria-label="Default select example">
                <option value="true">Active</option>
                <option value="false">Inactive</option>
            </select>
        </div>
    </div>

    <div class="col-2 px-1">
        <div class="mb-2">
            <button class="btn btn-success" (click)="Filter()">Search</button>
        </div>
    </div>
    <div class="col text-end">
        <button class="btn btn-success mx-1" (click)="add()"> <i class="bi bi-plus"></i> Add</button>
        <button class="btn btn-success mx-1" (click)="edit()"><i class="bi bi-pencil-square"></i> Edit</button>
        <button class="btn btn-danger mx-1" (click)="delete()"><i class="bi bi-trash3"></i> Delete</button>
    </div>


    <div class="col-md-12">
        <ag-grid-angular class="ag-theme-alpine" style="height: 70vh;width: 100%;" [columnDefs]="colDefsTransection"
            [rowData]="rowData" [rowSelection]="'single'" (gridReady)="onGridReadyTransection($event)"
            [defaultColDef]="DeafultCol">
        </ag-grid-angular>
    </div>


    <div class="col-md-12">
        <app-pagination [pageSize]="10" [currentPage]="pageIndex" [totalItems]="totalRecords"
            (pageChange)="PageChange($event)"></app-pagination>
    </div>


</div>




<nz-modal [(nzVisible)]="isVisibleModal" [nzTitle]="modalTitle" [nzWidth]="700" [nzClosable]="true"
    [nzMaskClosable]="false" [nzKeyboard]="false" [nzFooter]="modalFooter" (nzOnCancel)="handleCancel()">
    <ng-container *nzModalContent>
        <div class="grid grid-cols-12 gap-3">
            <div class="col-span-12">
                <label for="parentId" class="mb-1 block text-sm font-medium text-gray-700">
                    Category Tag
                </label>

                <select class="form-select" [(ngModel)]="oCustomCategoryRequestDto.typeTag" name="typeTag"
                    aria-label="Default select example">
                    <option value="">-- Select category tag--</option>
                    <option value="product_category">Product Category</option>
                    <option value="product_sub_category">Product Sub Category</option>
                    <option value="brand">Brand</option>
                    <option value="combo_offer">Combo Offer</option>
                    <option value="featured_category">Featured Category</option>
                    <option value="home_category">Home Category</option>
                    <option value="menu_category">Menu Category</option>
                    <option value="offer_category">Offer Category</option>
                    <option value="flash_sale_category">Flash Sale Category</option>
                    <option value="top_category">Top Category</option>
                    <option value="custom_category">Custom Category</option>
                </select>
            </div>
            <div class="col-span-12">
                <label for="parentId" class="mb-1 block text-sm font-medium text-gray-700">
                    Category
                </label>

                <nz-tree-select class="w-full" [nzNodes]="nodes" [(ngModel)]="oCustomCategoryRequestDto.categoryId"
                    nzShowSearch nzPlaceHolder="Please select category" nzVirtualHeight="300px" [nzHideUnMatched]="true"
                    [nzDropdownStyle]="{
            'max-height': '300px',
            'overflow': 'auto',
            'z-index': 2050
          }">
                </nz-tree-select>
            </div>

            <div class="col-span-12">
                <label for="name" class="mb-1 block text-sm font-medium text-gray-700">
                    Name
                </label>
                <input id="name" type="text"
                    class="w-full rounded-md border border-gray-300 px-3 py-2 outline-none focus:border-blue-500"
                    [(ngModel)]="oCustomCategoryRequestDto.name" name="name" placeholder="Please enter name" />
            </div>

            <div class="col-span-12">
                <label for="uploadFile" class="mb-1 block text-sm font-medium text-gray-700">
                    Image
                </label>
                <input id="uploadFile" type="file" class="block w-full rounded-md border border-gray-300 px-3 py-2"
                    (change)="onFileChange($event)" />
            </div>

            <div class="col-span-12" *ngIf="oCustomCategoryRequestDto.fileId > 0">
                <div class="overflow-hidden rounded-md border border-gray-200">
                    <img [src]="GetImageUrl(oCustomCategoryRequestDto.fileId)" alt="category-image"
                        class="h-[220px] w-full object-cover" />
                </div>
            </div>

            <div class="col-span-12">
                <label for="sequenceNo" class="mb-1 block text-sm font-medium text-gray-700">
                    Sequence No
                </label>
                <input id="sequenceNo" type="number"
                    class="w-full rounded-md border border-gray-300 px-3 py-2 outline-none focus:border-blue-500"
                    [(ngModel)]="oCustomCategoryRequestDto.sequenceNo" name="sequenceNo"
                    placeholder="Please enter sequence no" />
            </div>

            <div class="col-span-12">
                <label for="isActive" class="mb-1 block text-sm font-medium text-gray-700">
                    Status
                </label>
                <select id="isActive"
                    class="w-full rounded-md border border-gray-300 px-3 py-2 outline-none focus:border-blue-500"
                    [(ngModel)]="oCustomCategoryRequestDto.isActive" name="isActive">
                    <option [ngValue]="true">Active</option>
                    <option [ngValue]="false">Inactive</option>
                </select>
            </div>

            <div class="col-span-12">
                <label for="remarks" class="mb-1 block text-sm font-medium text-gray-700">
                    Remarks
                </label>
                <textarea id="remarks" rows="3"
                    class="w-full rounded-md border border-gray-300 px-3 py-2 outline-none focus:border-blue-500"
                    name="remarks" [(ngModel)]="oCustomCategoryRequestDto.remarks">
        </textarea>
            </div>
        </div>
    </ng-container>

    <ng-template #modalFooter>
        <div class="flex justify-end gap-2">
            <button nz-button (click)="handleCancel()">Cancel</button>

            <button *ngIf="customcategoryId === 0" nz-button nzType="primary" (click)="InsertCustomCategory()">
                Save
            </button>

            <button *ngIf="customcategoryId > 0" nz-button nzType="primary" (click)="UpdateCustomCategory()">
                Update
            </button>
        </div>
    </ng-template>
</nz-modal>


<button type="button" class="btn btn-primary" hidden data-bs-toggle="modal" id="openCommonDelete"
    data-bs-target="#staticCommonBackdrop">
    Launch static backdrop modal
</button>

<!-- Modal -->
<div class="modal fade" id="staticCommonBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
    aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="staticBackdropLabel">CustomCategory Delete</h1>
                <button type="button" class="btn-close" id="closeCommonDelete" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row g-0">
                    <div class="col-md-6 h2 text-center">
                        are you confirm delete?
                    </div>
                </div>
            </div>
            <div class="modal-footer text-center">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"> Close </button>
                <button type="button" class="btn btn-primary" (click)="DeleteCustomCategory()"> Confirm </button>
            </div>
        </div>
    </div>
</div>
