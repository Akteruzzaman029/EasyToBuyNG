<div class="container-fluid p-3 bg-light">

    <div class="d-flex justify-content-between align-items-center mb-3 px-2">
        <h5 class="fw-bold text-secondary mb-0">Product Create</h5>
        <button type="button" class="btn-close" (click)="closeTab()"></button>
    </div>

    <div class="card shadow-sm border-0 rounded-3 mb-3">
        <div class="card-body p-3">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Category</label>
                    <select class="form-select form-select-sm" [(ngModel)]="oProductRequestDto.categoryId"
                        (change)="onCategoryChange($event)">
                        <option value="0">-- select category --</option>
                        <option *ngFor="let item of categoryList" [value]="item.id">{{item.name}}</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Sub Category</label>
                    <select class="form-select form-select-sm" [(ngModel)]="oProductRequestDto.subCategoryId">
                        <option value="0">-- select sub category --</option>
                        <option *ngFor="let item of subCategoryFromList" [value]="item.id">{{item.name}}</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Measurement Unit</label>
                    <select class="form-select form-select-sm" [(ngModel)]="oProductRequestDto.measurementUnitId">
                        <option value="0">-- select unit --</option>
                        <option *ngFor="let item of measurementUnitList" [value]="item.id">{{item.unitName}}</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Pack Type</label>
                    <select class="form-select form-select-sm" [(ngModel)]="oProductRequestDto.packTypeId">
                        <option value="0">-- select pack type --</option>
                        <option *ngFor="let item of packTypeList" [value]="item.id">{{item.name}}</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Name</label>
                    <input type="text" class="form-control form-control-sm" [(ngModel)]="oProductRequestDto.name"
                        placeholder="Please enter name">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Short Name</label>
                    <input type="text" class="form-control form-control-sm" [(ngModel)]="oProductRequestDto.shortName"
                        placeholder="Please enter short name">
                </div>

                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Model No</label>
                    <input type="text" class="form-control form-control-sm" [(ngModel)]="oProductRequestDto.modelNo"
                        placeholder="Please enter model no">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Product Image</label>
                    <input type="file" class="form-control form-control-sm" (change)="onFileChange($event)">
                </div>

                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Description</label>
                    <textarea class="form-control form-control-sm" [(ngModel)]="oProductRequestDto.description"
                        rows="2"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Purchase Price</label>
                    <input type="number" class="form-control form-control-sm"
                        [(ngModel)]="oProductRequestDto.purchasePrice">
                </div>

                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">VAT</label>
                    <input type="number" class="form-control form-control-sm" [(ngModel)]="oProductRequestDto.vat">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Stock</label>
                    <input type="number" class="form-control form-control-sm" [(ngModel)]="oProductRequestDto.stock">
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0 rounded-3 mb-3">
        <div class="card-body p-3">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Is Consider</label>
                    <select class="form-select form-select-sm" [(ngModel)]="oProductRequestDto.isConsider">
                        <option [ngValue]="true">Active</option>
                        <option [ngValue]="false">Inactive</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Is Bar Code</label>
                    <select class="form-select form-select-sm" [(ngModel)]="oProductRequestDto.isBarCode">
                        <option [ngValue]="true">Active</option>
                        <option [ngValue]="false">Inactive</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Discount</label>
                    <input type="number" class="form-control form-control-sm" [(ngModel)]="oProductRequestDto.discount">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Is Fixed Amount</label>
                    <select class="form-select form-select-sm" [(ngModel)]="oProductRequestDto.isFixedAmount">
                        <option [ngValue]="true">Active</option>
                        <option [ngValue]="false">Inactive</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Status (Active)</label>
                    <select class="form-select form-select-sm" [(ngModel)]="oProductRequestDto.isActive">
                        <option [ngValue]="true">Active</option>
                        <option [ngValue]="false">Inactive</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-muted">Remarks</label>
                    <textarea class="form-control form-control-sm" [(ngModel)]="oProductRequestDto.remarks"
                        rows="1"></textarea>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3 mt-3">
  
  <div class="col-md-6">
    <div class="card shadow-sm border-0 rounded-3 h-100">
      <div class="card-body p-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <span class="text-danger fw-bold small">productImages</span>
          <button type="button" class="btn btn-outline-danger btn-sm py-0" (click)="addImage()" style="font-size: 12px;">+ Add Image</button>
        </div>
        <div class="table-responsive" style="max-height: 300px; overflow-y: auto;">
          <table class="table table-sm table-bordered align-middle mb-0" style="font-size: 12px;">
            <thead class="bg-light sticky-top text-center">
              <tr>
                <th>Image URL</th>
                <th width="60">Primary</th>
                <th width="60">Seq</th>
                <th width="40">Del</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let img of oProductRequestDto.productImages; let i = index">
                <td class="p-0">
                  <input type="text" class="form-control form-control-sm border-0 shadow-none bg-transparent" [(ngModel)]="img.imageUrl" placeholder="URL...">
                </td>
                <td class="text-center">
                  <input type="checkbox" class="form-check-input" [(ngModel)]="img.isPrimary">
                </td>
                <td class="p-0">
                  <input type="number" class="form-control form-control-sm border-0 shadow-none text-center bg-transparent" [(ngModel)]="img.sequenceNo">
                </td>
                <td class="text-center">
                  <i class="bi bi-trash text-danger cursor-pointer" (click)="removeImage(i)"></i>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card shadow-sm border-0 rounded-3 h-100">
      <div class="card-body p-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <span class="text-danger fw-bold small">productSizes</span>
          <button type="button" class="btn btn-outline-danger btn-sm py-0" (click)="addSize()" style="font-size: 12px;">+ Add Size</button>
        </div>
        <div class="table-responsive" style="max-height: 300px; overflow-y: auto;">
          <table class="table table-sm table-bordered align-middle mb-0" style="font-size: 12px;">
            <thead class="bg-light sticky-top text-center">
              <tr>
                <th>Size</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Disc. Value</th>
                <th width="40">Del</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let s of oProductRequestDto.productSizes; let i = index">
                <td class="p-0"><input type="text" class="form-control form-control-sm border-0 shadow-none bg-transparent" [(ngModel)]="s.size" placeholder="XL/XXL"></td>
                <td class="p-0"><input type="number" class="form-control form-control-sm border-0 shadow-none bg-transparent text-end" [(ngModel)]="s.price"></td>
                <td class="p-0"><input type="number" class="form-control form-control-sm border-0 shadow-none bg-transparent text-end" [(ngModel)]="s.stock"></td>
                <td class="p-0"><input type="number" class="form-control form-control-sm border-0 shadow-none bg-transparent text-end" [(ngModel)]="s.discountValue"></td>
                <td class="text-center">
                  <i class="bi bi-trash text-danger cursor-pointer" (click)="removeSize(i)"></i>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="mt-2 text-muted small px-1">
          * Discount Dates are set to current by default.
        </div>
      </div>
    </div>
  </div>

</div>

    <div class="text-end mt-3 mb-5 px-2">
        <button type="button" class="btn btn-primary px-5 fw-bold" (click)="InsertProduct()">Save</button>
    </div>
</div>
