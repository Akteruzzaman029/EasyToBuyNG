<button type="button" class="btn btn-primary" hidden data-bs-toggle="modal" id="openCommonDelete"
    data-bs-target="#staticCommonBackdrop">
    Launch static backdrop modal
</button>

<!-- Modal -->
<div class="modal fade" id="staticCommonBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
    aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5">{{modalTitle}}</h1>
                <button type="button" class="btn-close" id="closeCommonDelete" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>

            <div class="modal-body p-4 text-center">
                <div class="modal-body text-center">
                    <i class="bi bi-exclamation-circle text-danger display-4"></i>
                    <h4 class="fw-bold">{{modalTitle}}</h4>
                    <p>{{modalMessage}}</p>
                </div>

            </div>

             <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-cancel-custom mx-2" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" (click)="executeAction()">Confirm</button>
            </div>
        </div>
    </div>
</div>
